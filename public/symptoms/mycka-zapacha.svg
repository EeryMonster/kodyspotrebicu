<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dishwasher body (open, front view) -->
  <rect x="10" y="30" width="58" height="60" rx="8" fill="#4DB6AC"/>
  <!-- Door open (bottom part) -->
  <rect x="10" y="72" width="58" height="18" rx="8" fill="#3DA69C"/>
  <!-- Inner tub -->
  <rect x="16" y="30" width="46" height="42" rx="4" fill="#80CBC4"/>
  <!-- Dish rack lines -->
  <line x1="22" y1="35" x2="22" y2="68" stroke="#4DB6AC" stroke-width="2"/>
  <line x1="32" y1="35" x2="32" y2="68" stroke="#4DB6AC" stroke-width="2"/>
  <line x1="42" y1="35" x2="42" y2="68" stroke="#4DB6AC" stroke-width="2"/>
  <line x1="52" y1="35" x2="52" y2="68" stroke="#4DB6AC" stroke-width="2"/>
  <!-- Control panel -->
  <rect x="10" y="30" width="58" height="14" rx="8" fill="#3DA69C"/>
  <circle cx="54" cy="37" r="5" fill="#2C9C92"/>
  <!-- Sparkle -->
  <path d="M72 32 L74 26 L76 32 L82 34 L76 36 L74 42 L72 36 L66 34 Z" fill="#66BB6A"/>
  <!-- Smell waves -->
  <path d="M76 52 Q82 46 76 40" stroke="#A5D6A7" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M84 57 Q90 51 84 45" stroke="#A5D6A7" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
